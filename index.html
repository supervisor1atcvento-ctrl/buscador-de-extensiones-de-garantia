<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Búsqueda de Asesores - Google Sheet</title>
  <style>
    :root{font-family:Inter,system-ui,Segoe UI,Roboto,Arial;--accent:#0b74de}
    body{margin:0;padding:20px;background:#f6f8fb;color:#111}
    .container{max-width:1100px;margin:0 auto;background:#fff;padding:18px;border-radius:10px;box-shadow:0 6px 18px rgba(12,20,40,0.06)}
    header{display:flex;gap:12px;align-items:center;justify-content:space-between}
    h1{font-size:18px;margin:0}
    .search-row{display:flex;gap:8px;margin-top:12px}
    input[type="search"]{flex:1;padding:10px 12px;border:1px solid #d7dbe6;border-radius:8px;font-size:15px}
    button{background:var(--accent);color:#fff;border:0;padding:10px 14px;border-radius:8px;cursor:pointer}
    button.secondary{background:#eef3fb;color:var(--accent);border:1px solid #d7e6fb}
    table{width:100%;border-collapse:collapse;margin-top:14px}
    th,td{padding:10px;border-bottom:1px solid #eef0f5;text-align:left;font-size:14px}
    th{background:#fbfdff;color:#334155}
    .meta{margin-top:8px;color:#556070;font-size:13px}
    .pagination{display:flex;gap:8px;align-items:center;margin-top:12px}
    .small{font-size:13px;color:#6b7280}
    .copy-btn{background:#f3f4f6;border:1px solid #e5e7eb;padding:6px 8px;border-radius:6px;cursor:pointer}
    .empty{padding:20px;text-align:center;color:#6b7280}
    .error{color:#b91c1c}
    @media (max-width:700px){table,thead,tbody,th,td,tr{display:block} th{display:none} td{border:0;padding:8px 0}}
  </style>
</head>
<body>
  <div class="container" role="main">
    <header>
      <div>
        <h1>Búsqueda de datos - Google Sheet</h1>
        <div class="meta">Introduce texto para buscar en todas las columnas</div>
      </div>
      <div class="small">Modo de prueba incluido</div>
    </header>

    <div class="search-row" style="margin-top:14px">
      <input id="q" type="search" placeholder="Buscar por nombre, email, RFC, etc." />
      <button id="searchBtn">Buscar</button>
      <button id="clearBtn" class="secondary">Limpiar</button>
    </div>

    <div style="display:flex;gap:8px;align-items:center;margin-top:10px">
      <label class="small">Resultados por página</label>
      <select id="limit" style="padding:6px;border-radius:6px;border:1px solid #e6eef8">
        <option value="10">10</option>
        <option value="20" selected>20</option>
        <option value="50">50</option>
      </select>
      <label style="margin-left:12px" class="small"><input id="mockToggle" type="checkbox" /> Usar modo mock</label>
    </div>

    <div id="status" class="meta" style="margin-top:12px"></div>

    <div id="resultsArea">
      <table id="resultsTable" aria-live="polite" style="display:none">
        <thead id="thead"></thead>
        <tbody id="tbody"></tbody>
      </table>
      <div id="empty" class="empty" style="display:none">No se encontraron resultados</div>
    </div>

    <div class="pagination" id="pager" style="display:none">
      <button id="prev" class="secondary">Anterior</button>
      <div class="small" id="pageInfo">Página 1</div>
      <button id="next" class="secondary">Siguiente</button>
      <div style="flex:1"></div>
      <button id="copyAll" class="copy-btn">Copiar resultados visibles</button>
    </div>

    <div style="margin-top:14px" class="small">
      <strong>Nota</strong> El frontend espera un endpoint backend en <code>/api/search</code>. Ajusta la URL en la variable <code>API_BASE</code> dentro del script.
    </div>
  </div>

  <script>
    // Configuración
    const API_BASE = '/api/search'; // Cambia si tu endpoint es distinto
    let page = 1;
    let total = 0;
    let USE_MOCK = false;

    // Elementos
    const qInput = document.getElementById('q');
    const searchBtn = document.getElementById('searchBtn');
    const clearBtn = document.getElementById('clearBtn');
    const limitSelect = document.getElementById('limit');
    const status = document.getElementById('status');
    const thead = document.getElementById('thead');
    const tbody = document.getElementById('tbody');
    const resultsTable = document.getElementById('resultsTable');
    const empty = document.getElementById('empty');
    const pager = document.getElementById('pager');
    const prevBtn = document.getElementById('prev');
    const nextBtn = document.getElementById('next');
    const pageInfo = document.getElementById('pageInfo');
    const copyAll = document.getElementById('copyAll');
    const mockToggle = document.getElementById('mockToggle');

    mockToggle.addEventListener('change', e => {
      USE_MOCK = e.target.checked;
    });

    // Debounce simple
    let debounceTimer;
    qInput.addEventListener('input', () => {
      clearTimeout(debounceTimer);
      debounceTimer = setTimeout(() => { page = 1; doSearch(); }, 350);
    });

    searchBtn.addEventListener('click', () => { page = 1; doSearch(); });
    clearBtn.addEventListener('click', () => { qInput.value=''; page=1; doSearch(); });

    prevBtn.addEventListener('click', () => { if(page>1){ page--; doSearch(); }});
    nextBtn.addEventListener('click', () => { const maxPage = Math.ceil(total / Number(limitSelect.value)); if(page < maxPage){ page++; doSearch(); }});

    copyAll.addEventListener('click', () => {
      const rows = Array.from(tbody.querySelectorAll('tr')).map(tr => {
        return Array.from(tr.querySelectorAll('td')).map(td => td.textContent.trim()).join('\t');
      }).join('\n');
      navigator.clipboard.writeText(rows).then(()=> alert('Resultados copiados al portapapeles'));
    });

    async function doSearch(){
      const q = qInput.value.trim();
      const limit = Number(limitSelect.value);
      status.textContent = 'Buscando...';
      resultsTable.style.display = 'none';
      empty.style.display = 'none';
      pager.style.display = 'none';

      try {
        let data;
        if(USE_MOCK){
          data = mockSearch(q, page, limit);
          // Simular latencia
          await new Promise(r => setTimeout(r, 300));
        } else {
          const url = new URL(API_BASE, location.origin);
          url.searchParams.set('q', q);
          url.searchParams.set('page', page);
          url.searchParams.set('limit', limit);
          const res = await fetch(url.toString(), { method: 'GET', headers: { 'Accept': 'application/json' }});
          if(!res.ok) throw new Error('Error en el servidor: ' + res.status);
          data = await res.json();
        }

        total = data.total || (data.results ? data.results.length : 0);
        renderResults(data.results || []);
        status.textContent = `Mostrando ${ (data.results||[]).length } de ${ total } resultados`;
        const maxPage = Math.max(1, Math.ceil(total / limit));
        pageInfo.textContent = `Página ${page} de ${maxPage}`;
        pager.style.display = (total>0) ? 'flex' : 'none';
      } catch(err){
        console.error(err);
        status.innerHTML = '<span class="error">Error al buscar: ' + (err.message || err) + '</span>';
      }
    }

    function renderResults(rows){
      tbody.innerHTML = '';
      thead.innerHTML = '';
      if(!rows || rows.length === 0){
        resultsTable.style.display = 'none';
        empty.style.display = 'block';
        return;
      }
      // Construir encabezados a partir de las claves del primer objeto
      const keys = Object.keys(rows[0]);
      const trHead = document.createElement('tr');
      keys.forEach(k => {
        const th = document.createElement('th');
        th.textContent = k;
        trHead.appendChild(th);
      });
      thead.appendChild(trHead);

      rows.forEach(row => {
        const tr = document.createElement('tr');
        keys.forEach(k => {
          const td = document.createElement('td');
          td.textContent = row[k] ?? '';
          tr.appendChild(td);
        });
        tbody.appendChild(tr);
      });

      resultsTable.style.display = 'table';
      empty.style.display = 'none';
    }

    // Mock data para pruebas sin backend
    function mockSearch(q, page=1, limit=20){
      const all = [];
      for(let i=1;i<=137;i++){
        all.push({
          id: String(i),
          nombre: `Cliente ${i}`,
          email: `cliente${i}@ejemplo.com`,
          telefono: `55${10000000 + i}`,
          estado: i % 2 === 0 ? 'Activo' : 'Inactivo'
        });
      }
      const filtered = q ? all.filter(r => Object.values(r).some(v => String(v).toLowerCase().includes(q.toLowerCase()))) : all;
      const start = (page-1)*limit;
      const results = filtered.slice(start, start+limit);
      return { total: filtered.length, page, limit, results };
    }

    // Inicial
    doSearch();
  </script>
</body>
</html>
